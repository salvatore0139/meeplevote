<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Salvatore</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #ecf0f1; --text: #333; --danger: #e74c3c; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; color: var(--text); display: none; }
        nav { background: var(--primary); padding: 15px; display: flex; justify-content: space-between; align-items: center; color: white; }
        nav a { color: white; text-decoration: none; margin-left: 20px; font-size: 0.9em; }
        header { background-color: var(--primary); color: white; padding: 1rem; text-align: center; }
        
        .container { display: flex; max-width: 1600px; margin: 20px auto; gap: 20px; padding: 0 15px; }
        aside, main { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .col-left { width: 320px; position: sticky; top: 20px; }
        .col-center { flex-grow: 1; }
        .col-right { width: 320px; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .modal-content { background: white; margin: 5% auto; padding: 25px; width: 450px; border-radius: 12px; position: relative; max-height: 80vh; overflow-y: auto; }
        
        h3 { margin-top: 0; color: var(--primary); border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        .card-inner { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #eee; }
        
        input, select { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .btn-accent { background: var(--accent); }
        .btn-blue { background: var(--blue); }
        .btn-danger { background: var(--danger); }
        .btn:hover { opacity: 0.8; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .status-badge { padding: 4px 8px; border-radius: 10px; font-size: 0.8em; font-weight: bold; }
        .status-active { background: #d4edda; color: #155724; }

        /* Stili per la lista voti */
        .vote-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; }
        .vote-game { font-weight: bold; color: var(--primary); flex: 1; }
        .vote-count { background: var(--blue); color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.8em; margin: 0 10px; }
        .vote-names { font-size: 0.75em; color: #666; flex: 1; text-align: right; }
    </style>
</head>
<body>

<script type="module" src="ui-manager.js"></script>

<div class="container">
    <aside class="col-left">
        <h3>🚀 Controllo Sessione</h3>
        <div id="area-creazione">
            <label>Quanti giocatori stasera?</label>
            <input type="number" id="poll-players" placeholder="Es. 4">
            <button class="btn btn-accent" id="btn-start-poll">AVVIA SONDAGGIO</button>
        </div>
        
        <div id="active-poll-info" style="display:none;" class="card-inner">
            <p style="font-size: 1.1em;">Sondaggio attivo per:<br><strong id="active-p-text" style="color: var(--accent); font-size: 1.4em;"></strong> giocatori</p>
            <button class="btn btn-danger" id="btn-stop-poll">CHIUDI SONDAGGIO</button>
        </div>

        <h3 style="margin-top:30px;">👥 Convalida Utenti</h3>
        <div id="user-list">Caricamento utenti...</div>
    </aside>

    <main class="col-center">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3 style="border:none; margin:0;">📜 Storico Sondaggi</h3>
            <button class="btn btn-accent" id="open-modal-btn" style="width: auto;">➕ AGGIUNGI GIOCO</button>
        </div>
        
        <table id="history-table">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Giocatori</th>
                    <th>Stato</th>
                    <th>Vincitore</th>
                    <th>Azioni</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <div class="card-inner" style="margin-top: 40px;">
            <h3>📁 Importazione Massiva</h3>
            <p style="font-size: 0.8em; color: #666;">Carica il tuo file giochi.json aggiornato</p>
            <input type="file" id="json-input" accept=".json">
            <button class="btn btn-blue" id="btn-import-json">IMPORTA DATABASE JSON</button>
        </div>
    </main>
</div>

<div id="votesModal" class="modal">
    <div class="modal-content">
        <h3>📊 Risultati Votazione</h3>
        <div id="votes-container">Caricamento voti...</div>
        <button class="btn btn-danger" id="close-votes-btn" style="margin-top:15px;">Chiudi</button>
    </div>
</div>

<div id="gameModal" class="modal">
    <div class="modal-content">
        <h3>Nuovo Gioco a Catalogo</h3>
        <input type="text" id="m-name" placeholder="Titolo">
        <input type="text" id="m-bggId" placeholder="BGG ID">
        <input type="text" id="m-thumb" placeholder="URL Immagine (Thumbnail)">
        <div style="display:flex; gap:10px;">
            <input type="number" id="m-minP" placeholder="Min Giocatori">
            <input type="number" id="m-maxP" placeholder="Max Giocatori">
        </div>
        <input type="number" id="m-time" placeholder="Durata media (min)">
        <input type="text" id="m-type" placeholder="Categoria (es. Strategia)">
        <input type="text" id="m-voto" placeholder="Voto BGG">
        <select id="m-difficulty">
            <option value="Molto Facile">Molto Facile</option>
            <option value="Facile">Facile</option>
            <option value="Medio-Facile">Medio-Facile</option>
            <option value="Medio">Medio</option>
            <option value="Difficile">Difficile</option>
        </select>
        <button class="btn btn-accent" id="btn-save-manual">SALVA GIOCO</button>
        <button class="btn btn-danger" id="close-modal-btn" style="background:none; color:#666; font-size: 0.8em;">Annulla</button>
    </div>
</div>

<script type="module">
    import { db, auth } from "./firebase.js";
    import { collection, doc, getDocs, addDoc, updateDoc, onSnapshot, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const ADMIN_EMAIL = "salvatoredidato01@gmail.com";
    let polls = [];

    // --- PROTEZIONE DASHBOARD ---
    onAuthStateChanged(auth, (user) => {
        if (user && user.email === ADMIN_EMAIL) {
            document.body.style.display = 'block';
            initAdmin();
        } else {
            window.location.href = "index.html";
        }
    });

    // --- GESTIONE MODAL ---
    const modal = document.getElementById("gameModal");
    const vModal = document.getElementById("votesModal");
    
    document.getElementById("open-modal-btn").onclick = () => modal.style.display = "block";
    document.getElementById("close-modal-btn").onclick = () => modal.style.display = "none";
    document.getElementById("close-votes-btn").onclick = () => vModal.style.display = "none";

    function initAdmin() {
        onSnapshot(query(collection(db, "polls"), orderBy("timestamp", "desc")), (snap) => {
            polls = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderPolls();
        });

        onSnapshot(collection(db, "utenti"), (snap) => {
            const list = document.getElementById('user-list');
            list.innerHTML = snap.docs.map(d => {
                const u = d.data();
                return `
                    <div class="card-inner" style="padding:10px; display:flex; justify-content:space-between; align-items:center;">
                        <span>${u.username}</span>
                        ${u.validato ? '✅' : `<button class="btn btn-accent btn-valida" data-id="${d.id}" style="width:auto; padding:5px 10px;">Valida</button>`}
                    </div>`;
            }).join('');
            document.querySelectorAll('.btn-valida').forEach(b => b.onclick = () => updateDoc(doc(db, "utenti", b.dataset.id), { validato: true }));
        });
    }

    // --- RECUPERO VOTI SONDAGGIO ---
    async function loadVotes(pollId) {
        vModal.style.display = "block";
        const container = document.getElementById('votes-container');
        container.innerHTML = "Caricamento in corso...";

        try {
            const votesSnap = await getDocs(collection(db, `polls/${pollId}/votes`));
            const tally = {}; // { gameName: [user1, user2...] }

            votesSnap.forEach(voteDoc => {
                const v = voteDoc.data();
                if (!tally[v.gameName]) tally[v.gameName] = [];
                tally[v.gameName].push(v.userName || "Anonimo");
            });

            // Ordina per numero di voti descrescente
            const sorted = Object.entries(tally).sort((a, b) => b[1].length - a[1].length);

            if (sorted.length === 0) {
                container.innerHTML = "<p>Nessun voto effettuato in questo sondaggio.</p>";
                return;
            }

            container.innerHTML = sorted.map(([game, users]) => `
                <div class="vote-row">
                    <span class="vote-game">${game}</span>
                    <span class="vote-count">${users.length}</span>
                    <span class="vote-names">${users.join(", ")}</span>
                </div>
            `).join('');

        } catch (e) {
            container.innerHTML = "Errore nel caricamento voti.";
            console.error(e);
        }
    }

    function renderPolls() {
        const active = polls.find(p => p.status === "active");
        document.getElementById('area-creazione').style.display = active ? 'none' : 'block';
        document.getElementById('active-poll-info').style.display = active ? 'block' : 'none';
        if(active) document.getElementById('active-p-text').textContent = active.players;

        const tbody = document.querySelector('#history-table tbody');
        tbody.innerHTML = polls.map(p => `
            <tr>
                <td>${p.timestamp?.toDate().toLocaleDateString() || 'Recent'}</td>
                <td>${p.players}</td>
                <td><span class="status-badge ${p.status === 'active' ? 'status-active' : ''}">${p.status.toUpperCase()}</span></td>
                <td>${p.winner || '-'}</td>
                <td>
                    <button class="btn btn-blue btn-view-votes" data-id="${p.id}" style="width:auto; padding:5px 10px; font-size:0.8em;">📊 VOTI</button>
                </td>
            </tr>
        `).join('');

        document.querySelectorAll('.btn-view-votes').forEach(btn => {
            btn.onclick = () => loadVotes(btn.dataset.id);
        });
    }

    // --- AZIONI SONDAGGIO ---
    document.getElementById('btn-start-poll').onclick = async () => {
        const p = document.getElementById('poll-players').value;
        if(!p) return alert("Inserisci il numero di giocatori!");
        await addDoc(collection(db, "polls"), { players: parseInt(p), status: "active", timestamp: serverTimestamp() });
    };

    document.getElementById('btn-stop-poll').onclick = async () => {
        const active = polls.find(p => p.status === "active");
        if(active) await updateDoc(doc(db, "polls", active.id), { status: "closed" });
    };

    // --- IMPORTAZIONE JSON ---
    document.getElementById('btn-import-json').onclick = async () => {
        const file = document.getElementById('json-input').files[0];
        if(!file) return alert("Seleziona il file JSON!");
        const data = JSON.parse(await file.text());
        let aggiunti = 0, saltati = 0;
        for(let g of data) {
            const currentBggId = g.bggId || (g.link ? g.link.split('/').pop() : null);
            if(!currentBggId) continue;
            const q = query(collection(db, "giochi"), where("bggId", "==", currentBggId));
            const snap = await getDocs(q);
            if(snap.empty) {
                await addDoc(collection(db, "giochi"), { ...g, bggId: currentBggId, addedAt: serverTimestamp() });
                aggiunti++;
            } else { saltati++; }
        }
        alert(`Operazione completata!\nNuovi: ${aggiunti}\nGià esistenti: ${saltati}`);
    };

    // --- SALVATAGGIO MANUALE ---
    document.getElementById('btn-save-manual').onclick = async () => {
        const bid = document.getElementById('m-bggId').value;
        if(!bid) return alert("Inserisci almeno il BGG ID");
        const q = query(collection(db, "giochi"), where("bggId", "==", bid));
        const snap = await getDocs(q);
        if(!snap.empty) return alert("Questo gioco è già nel database!");

        await addDoc(collection(db, "giochi"), {
            name: document.getElementById('m-name').value,
            bggId: bid,
            thumb: document.getElementById('m-thumb').value,
            minP: parseInt(document.getElementById('m-minP').value) || 1,
            maxP: parseInt(document.getElementById('m-maxP').value) || 1,
            time: parseInt(document.getElementById('m-time').value) || 0,
            type: document.getElementById('m-type').value,
            voto: document.getElementById('m-voto').value,
            difficulty: document.getElementById('m-difficulty').value,
            link: `https://boardgamegeek.com/boardgame/${bid}`,
            addedAt: serverTimestamp()
        });
        alert("Gioco aggiunto con successo!");
        modal.style.display = "none";
    };

    document.getElementById('btn-logout').onclick = () => signOut(auth);
</script>
</body>
</html>
