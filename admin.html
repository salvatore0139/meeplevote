<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Salvatore</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #ecf0f1; --text: #333; --danger: #e74c3c; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; color: var(--text); display: none; }
        nav { background: var(--primary); padding: 15px; display: flex; justify-content: space-between; align-items: center; color: white; }
        nav a { color: white; text-decoration: none; margin-left: 20px; font-size: 0.9em; }
        header { background-color: var(--primary); color: white; padding: 1rem; text-align: center; }
        .container { display: flex; max-width: 1600px; margin: 20px auto; gap: 20px; padding: 0 15px; }
        aside, main { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .col-left { width: 300px; } .col-center { flex-grow: 1; } .col-right { width: 350px; }
        
        /* Modal Style */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 5% auto; padding: 20px; width: 400px; border-radius: 10px; }
        
        input, select { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; }
        .btn-accent { background: var(--accent); }
        .btn-blue { background: var(--blue); }
        .btn-danger { background: var(--danger); margin-top: 10px; }
        .card-inner { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #eee; }
    </style>
</head>
<body>

<nav>
    <div style="font-weight: bold;">🛠️ Dashboard Admin</div>
    <div><a href="index.html">Catalogo</a> <a href="#" id="btn-logout">Esci</a></div>
</nav>

<div class="container">
    <aside class="col-left">
        <h3>🚀 Sessione Attiva</h3>
        <div id="area-creazione">
            <input type="number" id="poll-players" placeholder="N. Giocatori">
            <button class="btn btn-accent" id="btn-start-poll">AVVIA SONDAGGIO</button>
        </div>
        <div id="active-poll-info" style="display:none;" class="card-inner">
            <p id="active-p-text"></p>
            <button class="btn btn-danger" id="btn-stop-poll">CHIUDI SONDAGGIO</button>
        </div>
    </aside>

    <main class="col-center">
        <h3>📦 Gestione Giochi</h3>
        <button class="btn btn-accent" id="open-modal-btn">➕ AGGIUNGI NUOVO GIOCO</button>
        <hr>
        <div id="import-section" class="card-inner">
            <h4>📁 Importazione Massiva JSON</h4>
            <input type="file" id="json-input" accept=".json">
            <button class="btn btn-blue" id="btn-import-json">CARICA JSON</button>
        </div>
    </main>

    <aside class="col-right">
        <h3>👥 Utenti da convalidare</h3>
        <div id="user-list">Caricamento...</div>
    </aside>
</div>

<div id="gameModal" class="modal">
    <div class="modal-content">
        <h3>Nuovo Gioco</h3>
        <input type="text" id="m-name" placeholder="Titolo (es. Jamaica)">
        <input type="text" id="m-bggId" placeholder="BGG ID (es. 28023)">
        <input type="text" id="m-thumb" placeholder="URL Immagine">
        <div style="display:flex; gap:10px;">
            <input type="number" id="m-minP" placeholder="Min P.">
            <input type="number" id="m-maxP" placeholder="Max P.">
        </div>
        <input type="number" id="m-time" placeholder="Durata (min)">
        <input type="text" id="m-type" placeholder="Tipo (es. Corse / Pirati)">
        <input type="text" id="m-voto" placeholder="Voto BGG (es. 7.5)">
        <select id="m-difficulty">
            <option value="Molto Facile">Molto Facile</option>
            <option value="Facile">Facile</option>
            <option value="Medio-Facile">Medio-Facile</option>
            <option value="Medio">Medio</option>
            <option value="Difficile">Difficile</option>
        </select>
        <button class="btn btn-accent" id="btn-save-manual">SALVA NEL DATABASE</button>
        <button class="btn btn-danger" id="close-modal-btn">ANNULLA</button>
    </div>
</div>

<script type="module">
    import { db, auth } from "./firebase.js";
    import { collection, doc, getDocs, addDoc, updateDoc, query, where, serverTimestamp, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const ADMIN_EMAIL = "salvatoredidato01@gmail.com";

    // --- GESTIONE ACCESSO ---
    onAuthStateChanged(auth, (user) => {
        if (user && user.email === ADMIN_EMAIL) { document.body.style.display = 'block'; initAdmin(); }
        else { window.location.href = "index.html"; }
    });

    // --- MODAL LOGIC ---
    const modal = document.getElementById("gameModal");
    document.getElementById("open-modal-btn").onclick = () => modal.style.display = "block";
    document.getElementById("close-modal-btn").onclick = () => modal.style.display = "none";

    // --- AGGIUNTA MANUALE ---
    document.getElementById('btn-save-manual').onclick = async () => {
        const gioco = {
            name: document.getElementById('m-name').value,
            bggId: document.getElementById('m-bggId').value,
            thumb: document.getElementById('m-thumb').value,
            minP: parseInt(document.getElementById('m-minP').value),
            maxP: parseInt(document.getElementById('m-maxP').value),
            time: parseInt(document.getElementById('m-time').value),
            type: document.getElementById('m-type').value,
            voto: document.getElementById('m-voto').value,
            difficulty: document.getElementById('m-difficulty').value,
            link: `https://boardgamegeek.com/boardgame/${document.getElementById('m-bggId').value}`,
            addedAt: serverTimestamp()
        };

        const q = query(collection(db, "giochi"), where("bggId", "==", gioco.bggId));
        const snap = await getDocs(q);
        if(!snap.empty) return alert("Errore: Questo gioco esiste già!");

        await addDoc(collection(db, "giochi"), gioco);
        alert("Gioco aggiunto!");
        modal.style.display = "none";
    };

    // --- IMPORTAZIONE JSON ---
    document.getElementById('btn-import-json').onclick = async () => {
        const file = document.getElementById('json-input').files[0];
        if(!file) return alert("Seleziona il file JSON!");

        const data = JSON.parse(await file.text());
        let aggiunti = 0, saltati = 0;

        for(let g of data) {
            const bggId = g.link.split('/').pop(); // Estrae ID dal link se manca bggId
            const q = query(collection(db, "giochi"), where("bggId", "==", (g.bggId || bggId)));
            const snap = await getDocs(q);

            if(snap.empty) {
                await addDoc(collection(db, "giochi"), {
                    ...g,
                    bggId: g.bggId || bggId,
                    addedAt: serverTimestamp()
                });
                aggiunti++;
            } else { saltati++; }
        }
        alert(`Fatto! Aggiunti: ${aggiunti}, Saltati (doppioni): ${saltati}`);
    };

    function initAdmin() {
        // Qui caricherai le liste utenti e sondaggi come prima
        onSnapshot(collection(db, "utenti"), (snap) => {
            document.getElementById('user-list').innerHTML = snap.docs.map(d => `
                <div class="card-inner">
                    ${d.data().username} ${d.data().validato ? '✅' : `<button onclick="valida('${d.id}')">Valida</button>`}
                </div>
            `).join('');
        });
    }
    window.valida = (id) => updateDoc(doc(db, "utenti", id), { validato: true });
    document.getElementById('btn-logout').onclick = () => signOut(auth);
</script>
</body>
</html>
