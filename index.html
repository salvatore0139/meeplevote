<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo - Salvatore </title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #ecf0f1; --text: #333; --orange: #e67e22; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; color: var(--text); }
        nav { background: var(--primary); padding: 15px; display: flex; justify-content: space-between; align-items: center; color: white; }
        nav a { color: white; text-decoration: none; margin-left: 20px; font-size: 0.9em; cursor: pointer; }
        header { background-color: var(--primary); color: white; padding: 2rem 1rem; text-align: center; }
        
        .container { max-width: 1400px; margin: 20px auto; padding: 0 15px; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .game-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .game-card img { width: 100%; height: 160px; object-fit: cover; }
        .game-card-content { padding: 15px; text-align: center; }
        
        /* STILI PER IL POP-UP (MODALE) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: white; padding: 25px; border-radius: 12px; width: 320px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; cursor: pointer; font-size: 1.2em; font-weight: bold; color: #888; }
        .modal-box input { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; }
        .btn-accent { background: var(--accent); }
        .btn-blue { background: var(--blue); }
        .toggle-link { display: block; text-align: center; font-size: 0.8em; margin-top: 15px; color: var(--blue); cursor: pointer; }
    </style>
</head>
<body>

<nav>
    <div style="font-weight: bold;">🎲 Salvatore Games</div>
    <div>
        <a href="index.html" style="color:var(--orange)">Catalogo</a> 
        <a onclick="navigate('sondaggi.html')">Vota</a> 
        <a onclick="navigate('admin.html')">Admin</a>
        <a id="nav-logout" onclick="logout()" style="display:none; color: #e74c3c;">Esci</a>
    </div>
</nav>

<header>
    <h1>Benvenuto nel Catalogo Giochi</h1>
    <p>Sfoglia i giochi, accedi e partecipa ai sondaggi per le serate!</p>
</header>

<div class="container">
    <div id="loading" style="text-align:center; padding: 20px;">Caricamento giochi da Firebase... ⏳</div>
    <div id="game-grid" class="game-grid"></div>
</div>

<div id="auth-modal" class="modal-overlay">
    <div class="modal-box">
        <span class="close-btn" onclick="closeModal()">×</span>
        
        <div id="login-section">
            <h3 style="margin-top:0;">🔐 Accedi</h3>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-pass" placeholder="Password (min. 6 caratteri)">
            <button class="btn btn-accent" onclick="doLogin()">ACCEDI</button>
            <span class="toggle-link" onclick="toggleMode('register')">Non hai un account? Registrati</span>
        </div>

        <div id="register-section" style="display:none;">
            <h3 style="margin-top:0;">📝 Registrati</h3>
            <input type="text" id="reg-user" placeholder="Nome o Username">
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-pass" placeholder="Password (min. 6 caratteri)">
            <button class="btn btn-blue" onclick="doRegister()">REGISTRATI</button>
            <span class="toggle-link" onclick="toggleMode('login')">Hai già un account? Accedi</span>
        </div>
    </div>
</div>

<script type="module">
    import { db, auth } from "./firebase.js";
    import { collection, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    let currentUser = null;
    let targetPage = null; // Salva la pagina dove l'utente voleva andare

    // 1. ASCOLTA L'AUTENTICAZIONE
    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        document.getElementById('nav-logout').style.display = user ? 'inline' : 'none';
        
        if (user) {
            closeModal();
            // Se l'utente si è appena loggato e voleva andare in una pagina specifica, mandiamocelo
            if(targetPage) {
                window.location.href = targetPage;
            }
        }
    });

    // 2. SCARICA I GIOCHI DA FIREBASE
    async function loadGames() {
        const grid = document.getElementById('game-grid');
        const loading = document.getElementById('loading');
        
        try {
            const snap = await getDocs(collection(db, "giochi"));
            if (snap.empty) {
                loading.innerHTML = "Nessun gioco presente nel database. Chiedi all'admin di aggiungerli!";
                return;
            }

            loading.style.display = 'none';
            grid.innerHTML = snap.docs.map(d => {
                const g = d.data();
                return `
                    <div class="game-card">
                        <img src="${g.thumb || 'https://via.placeholder.com/300x200?text=No+Image'}">
                        <div class="game-card-content">
                            <h4 style="margin:0 0 10px 0;">${g.name}</h4>
                            <div style="font-size: 0.85em; color: #666;">
                                👥 ${g.minP} - ${g.maxP} Giocatori<br>
                                ⏱️ ${g.time} min
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        } catch (e) {
            console.error(e);
            loading.innerHTML = "❌ Errore nel caricamento del database.";
        }
    }

    loadGames(); // Avvia subito il caricamento

    // 3. GESTIONE DELLA NAVIGAZIONE (Il "Muro" del Login)
    window.navigate = (page) => {
        if (currentUser) {
            window.location.href = page; // Se sei loggato, vai tranquillo
        } else {
            targetPage = page; // Salva la destinazione
            document.getElementById('auth-modal').style.display = 'flex'; // Mostra il pop-up
        }
    };

    // 4. FUNZIONI DEL POP-UP
    window.closeModal = () => {
        document.getElementById('auth-modal').style.display = 'none';
        targetPage = null; // Resetta la destinazione
    };

    window.toggleMode = (mode) => {
        document.getElementById('login-section').style.display = mode === 'login' ? 'block' : 'none';
        document.getElementById('register-section').style.display = mode === 'register' ? 'block' : 'none';
    };

    window.doLogin = async () => {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-pass').value;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
        } catch (e) {
            alert("❌ Errore di accesso: Controlla email e password.");
            console.error(e);
        }
    };

    window.doRegister = async () => {
        const user = document.getElementById('reg-user').value;
        const email = document.getElementById('reg-email').value;
        const pass = document.getElementById('reg-pass').value;
        
        if (!user || !email || !pass) return alert("⚠️ Compila tutti i campi!");
        if (pass.length < 6) return alert("⚠️ La password deve avere almeno 6 caratteri!");

        try {
            // Crea l'account in Firebase Auth
            const res = await createUserWithEmailAndPassword(auth, email, pass);
            // Salva i dati extra nel database Firestore
            await setDoc(doc(db, "utenti", res.user.uid), { 
                username: user, 
                email: email, 
                validato: false 
            });
            alert("✅ Registrazione completata!");
        } catch (e) {
            // Se fallisce, Firebase ci dice il motivo (es. email già usata)
            alert("❌ Errore durante la registrazione: " + e.message);
            console.error(e);
        }
    };

    window.logout = () => signOut(auth);

</script>
</body>
</html>
