<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo Giochi - Salvatore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --bg: #ecf0f1;
            --text: #333;
            --gold: #f1c40f;
            --orange: #e67e22;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            color: var(--text);
            height: 100vh; /* Blocca l'altezza */
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Impedisce scroll esterno */
        }

        header {
            background-color: var(--primary);
            color: white;
            padding: 1rem 2rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            flex-shrink: 0;
            z-index: 10;
        }

        .container {
            display: flex;
            max-width: 1600px;
            margin: 0 auto;
            gap: 20px;
            padding: 20px;
            flex-grow: 1;
            overflow: hidden; /* Fondamentale per lo scroll interno */
            width: 100%;
            box-sizing: border-box;
        }

        /* SIDEBAR FILTRI */
        aside {
            width: 300px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex-shrink: 0;
        }

        aside h3 { margin-top: 0; color: var(--primary); border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        .filter-group { margin-bottom: 5px; }
        label { display: block; font-size: 0.85em; margin-bottom: 5px; font-weight: bold; color: #666; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; background: #fff; }

        #btn-filtra {
            background: var(--accent); color: white; border: none; padding: 12px;
            border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        #btn-filtra:hover { background: #219150; }

        /* AREA SCROLLABILE (Come sondaggi.html) */
        main { 
            flex-grow: 1; 
            overflow-y: auto; /* Attiva lo scroll solo qui */
            padding-right: 15px;
        }

        /* Scrollbar personalizzata */
        main::-webkit-scrollbar { width: 8px; }
        main::-webkit-scrollbar-track { background: #f1f1f1; }
        main::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        /* GRIGLIA COMPATTA */
        #game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
            padding-bottom: 40px;
        }

        /* CARD GIOCHI */
        .game-card {
            background: white; border-radius: 10px; overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1); transition: 0.2s;
            display: flex; flex-direction: column; position: relative;
            border: 1px solid transparent;
        }
        .game-card:hover { transform: translateY(-3px); box-shadow: 0 5px 12px rgba(0,0,0,0.15); }
        
        .voto-badge {
            position: absolute; top: 8px; right: 8px;
            background: rgba(0,0,0,0.7); color: var(--gold);
            padding: 3px 6px; border-radius: 4px; font-weight: bold; font-size: 0.75em;
            z-index: 2;
        }

        .poll-badge {
            position: absolute; top: 8px; left: 8px;
            background: var(--orange); color: white;
            padding: 3px 6px; border-radius: 4px; font-weight: bold; font-size: 0.7em;
            z-index: 2;
        }

        .game-card img { width: 100%; height: 150px; object-fit: cover; background: #eee; }
        .game-card-content { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; }
        .game-card h4 { margin: 0 0 8px 0; font-size: 0.95em; color: var(--primary); line-height: 1.2; height: 2.4em; overflow: hidden; }
        
        .info { font-size: 0.8em; color: #666; margin-bottom: 4px; }
        .info i { color: var(--accent); width: 18px; text-align: center; }

        .tag { 
            display: inline-block; background: #f0f2f5; padding: 2px 6px; 
            border-radius: 4px; font-size: 0.65em; font-weight: bold; 
            margin-top: 5px; color: #555;
        }

        .btn-rules {
            margin-top: 10px; display: block; text-align: center;
            padding: 8px; background: var(--primary); color: white;
            text-decoration: none; border-radius: 5px; font-size: 0.75em; font-weight: bold;
        }

        @media (max-width: 900px) {
            body { overflow: auto; height: auto; }
            .container { flex-direction: column; overflow: visible; }
            aside { width: 100%; box-sizing: border-box; }
            main { overflow: visible; padding-right: 0; }
        }
    </style>
</head>
<body>

<header>
    <h1>🎲 Catalogo Salvatore Games</h1>
</header>

<div class="container">
    <aside>
        <h3>🔍 Filtri</h3>
        
        <div class="filter-group">
            <label><i class="fas fa-sort"></i> Ordina per:</label>
            <select id="f-sort">
                <option value="name_asc">Nome (A-Z)</option>
                <option value="voto_desc">Miglior Voto BGG</option>
                <option value="poll_desc">Più votati nei sondaggi</option>
                <option value="players_desc">Più capienti (Giocatori)</option>
            </select>
        </div>

        <div class="filter-group">
            <label><i class="fas fa-users"></i> Numero Giocatori</label>
            <input type="number" id="f-players" placeholder="Quanti siete?">
        </div>

        <div class="filter-group">
            <label><i class="fas fa-layer-group"></i> Categoria</label>
            <select id="f-type">
                <option value="all">Tutte</option>
                <option value="Strategia">Strategia</option>
                <option value="Party Game">Party Game</option>
                <option value="Carte">Carte</option>
                <option value="Cooperativo">Cooperativo</option>
            </select>
        </div>

        <button id="btn-filtra">AGGIORNA ELENCO</button>
    </aside>

    <main>
        <div id="game-grid"></div>
    </main>
</div>

<script type="module">
    import { db } from "./firebase.js";
    import { collection, onSnapshot, query, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    let TUTTI_I_GIOCHI = [];
    let POLL_STATS = {}; 

    async function init() {
        // Carichiamo statistiche sondaggi
        const pollsSnap = await getDocs(collection(db, "polls"));
        for (const pollDoc of pollsSnap.docs) {
            const votesSnap = await getDocs(collection(db, `polls/${pollDoc.id}/votes`));
            votesSnap.forEach(v => {
                const gameName = v.data().game;
                POLL_STATS[gameName] = (POLL_STATS[gameName] || 0) + 1;
            });
        }

        // Ascolto real-time giochi
        onSnapshot(collection(db, "giochi"), (snapshot) => {
            TUTTI_I_GIOCHI = snapshot.docs.map(doc => ({
                id: doc.id,
                pollCount: POLL_STATS[doc.data().name] || 0,
                ...doc.data()
            }));
            applicaFiltri(); 
        });
    }

    window.applicaFiltri = () => {
        const players = document.getElementById('f-players').value;
        const type = document.getElementById('f-type').value;
        const sortType = document.getElementById('f-sort').value;

        let filtrati = TUTTI_I_GIOCHI.filter(g => {
            const okPlayers = !players || (players >= (g.minP || 0) && players <= (g.maxP || 99));
            const okType = (type === "all") || (g.type && g.type.includes(type));
            return okPlayers && okType;
        });

        filtrati.sort((a, b) => {
            switch(sortType) {
                case "name_asc": return a.name.localeCompare(b.name);
                case "voto_desc": return (parseFloat(b.voto) || 0) - (parseFloat(a.voto) || 0);
                case "poll_desc": return b.pollCount - a.pollCount;
                case "players_desc": return (b.maxP || 0) - (a.maxP || 0);
                default: return 0;
            }
        });

        renderizza(filtrati);
    };

    document.getElementById('btn-filtra').onclick = applicaFiltri;
    document.getElementById('f-sort').onchange = applicaFiltri;

    function renderizza(lista) {
        const grid = document.getElementById('game-grid');
        grid.innerHTML = lista.map(g => `
            <div class="game-card">
                ${g.voto ? `<div class="voto-badge"><i class="fas fa-star"></i> ${g.voto}</div>` : ''}
                ${g.pollCount > 0 ? `<div class="poll-badge"><i class="fas fa-fire"></i> ${g.pollCount}</div>` : ''}
                
                <img src="${g.thumb || 'https://via.placeholder.com/220x150?text=No+Image'}" alt="${g.name}">
                
                <div class="game-card-content">
                    <h4>${g.name}</h4>
                    <div class="info"><i class="fas fa-users"></i> ${g.minP}-${g.maxP} Giocatori</div>
                    <div class="info"><i class="fas fa-clock"></i> ${g.time || '--'} min</div>
                    <div><span class="tag">${g.type || 'Board Game'}</span></div>
                    <a href="${g.link || '#'}" target="_blank" class="btn-rules">DETTAGLI BGG</a>
                </div>
            </div>
        `).join('');
    }

    init();
</script>

</body>
</html>
