<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sondaggio Games - Salvatore</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #ecf0f1; --text: #333; --orange: #e67e22; --danger: #e74c3c; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; color: var(--text); }
        header { background-color: var(--primary); color: white; padding: 1rem; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .container { display: flex; max-width: 1400px; margin: 20px auto; gap: 20px; padding: 0 15px; }
        
        /* Sidebars */
        aside { width: 280px; flex-shrink: 0; }
        .card-aside { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        main { flex-grow: 1; }
        
        /* Grid */
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; }
        .game-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; flex-direction: column; transition: 0.3s; border: 3px solid transparent; }
        .game-card.highlight { border-color: var(--orange); transform: scale(1.02); box-shadow: 0 5px 15px rgba(230, 126, 34, 0.4); }
        .game-card img { width: 100%; height: 150px; object-fit: cover; }
        .game-card-content { padding: 15px; flex-grow: 1; text-align: center; }
        .game-card h4 { margin: 0 0 10px 0; font-size: 1.1em; color: var(--primary); }
        
        /* Buttons */
        .btn-vota { width: 100%; background: var(--accent); color: white; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-vota:hover { opacity: 0.9; }
        .btn-vota:disabled { background: #bdc3c7; cursor: not-allowed; }
        .btn-danger { background: var(--danger); width: 100%; padding: 10px; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* Form */
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        label { font-size: 0.85em; font-weight: bold; color: #666; display: block; margin-bottom: 5px; }

        /* Utility */
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; }
        .user-tag { background: #f1f1f1; padding: 5px 10px; border-radius: 20px; font-size: 0.85em; cursor: pointer; display: inline-block; margin: 3px; transition: 0.2s; border: 1px solid transparent; }
        .user-tag:hover { border-color: var(--orange); background: #fff; }
        .user-tag.active { background: var(--orange); color: white; }

        @media (max-width: 1024px) { .container { flex-direction: column; } aside { width: 100%; } }
    </style>
</head>
<body>

<script type="module" src="ui-manager.js"></script>

<header><h1>🔥 Sondaggio Serata Games</h1></header>

<div class="container">
    <aside>
        <div class="card-aside">
            <h3>🔍 Filtri</h3>
            <label>Categoria</label>
            <select id="f-type"><option value="all">Tutte</option></select>
            
            <label>Tempo Massimo (min)</label>
            <input type="number" id="f-time" placeholder="Es. 60">
        </div>

        <div class="card-aside" id="participants-box">
            <h3>👥 Chi ha votato?</h3>
            <div id="user-list">Accedi per vedere...</div>
            <p style="font-size: 0.7em; color: #888; margin-top: 10px;">Clicca su un nome per vedere i suoi voti</p>
        </div>
    </aside>

    <main>
        <div id="status-sondaggio" style="margin-bottom: 15px; font-size: 1.2em; font-weight: bold; color: var(--primary);"></div>
        <div id="game-grid" class="game-grid"></div>
    </main>

    <aside>
        <div class="card-aside">
            <h3>📊 Classifica</h3>
            <div id="classifica-voti">Caricamento...</div>
        </div>
    </aside>
</div>

<script type="module">
    import { db, auth } from "./firebase.js";
    import { collection, doc, getDoc, onSnapshot, query, where, addDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    let currentUser = null;
    let userDoc = null;
    let activePoll = null;
    let allGames = [];
    let currentVotes = [];
    let selectedUserHighlight = null;
    let unsubscribeVotes = null;

    // --- Inizializzazione Listener ---
    
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            const d = await getDoc(doc(db, "utenti", user.uid));
            userDoc = d.data();
        } else {
            currentUser = null;
            userDoc = null;
        }
        renderUI();
    });

    onSnapshot(collection(db, "giochi"), (snap) => {
        allGames = snap.docs.map(d => d.data());
        popolaCategorie();
        renderUI();
    });

    onSnapshot(query(collection(db, "polls"), where("status", "==", "active")), (snap) => {
        if (!snap.empty) {
            activePoll = {id: snap.docs[0].id, ...snap.docs[0].data()};
            if (unsubscribeVotes) unsubscribeVotes();
            unsubscribeVotes = onSnapshot(collection(db, "polls", activePoll.id, "votes"), (vSnap) => {
                currentVotes = vSnap.docs.map(d => ({id: d.id, ...d.data()}));
                renderUI();
                updateRanking();
                updateParticipants();
            });
        } else {
            activePoll = null;
            currentVotes = [];
            renderUI();
            updateRanking();
        }
    });

    // --- Logica UI ---

    function popolaCategorie() {
        const select = document.getElementById('f-type');
        const types = [...new Set(allGames.map(g => g.type))].sort();
        if (select.children.length > 1) return;
        types.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t; opt.textContent = t;
            select.appendChild(opt);
        });
    }

    function renderUI() {
        const grid = document.getElementById('game-grid');
        const status = document.getElementById('status-sondaggio');
        const fType = document.getElementById('f-type').value;
        const fTime = document.getElementById('f-time').value;

        if (!activePoll) {
            status.innerHTML = "😴 Nessun sondaggio attivo.";
            grid.innerHTML = "";
            return;
        }

        status.innerHTML = `✅ Sondaggio per ${activePoll.players} Giocatori`;
        
        let filtrati = allGames.filter(g => activePoll.players >= g.minP && activePoll.players <= g.maxP);
        if (fType !== 'all') filtrati = filtrati.filter(g => g.type === fType);
        if (fTime) filtrati = filtrati.filter(g => g.time <= parseInt(fTime));

function renderUI() {
    const grid = document.getElementById('game-grid');
    const status = document.getElementById('status-sondaggio');
    const fType = document.getElementById('f-type').value;
    const fTime = document.getElementById('f-time').value;

    if (!activePoll) {
        status.innerHTML = "😴 Nessun sondaggio attivo.";
        grid.innerHTML = "";
        return;
    }

    status.innerHTML = `✅ Sondaggio per ${activePoll.players} Giocatori`;
    
    // Filtriamo i giochi in base al numero di giocatori del sondaggio + i filtri scelti dall'utente
    let filtrati = allGames.filter(g => activePoll.players >= g.minP && activePoll.players <= g.maxP);
    if (fType !== 'all') filtrati = filtrati.filter(g => g.type === fType);
    if (fTime) filtrati = filtrati.filter(g => g.time <= parseInt(fTime));

    // QUI VA IL BLOCCO CHE HAI SCRITTO TU:
    grid.innerHTML = filtrati.map(g => {
        // 1. Cerchiamo se l'utente loggato ha votato questo specifico gioco
        const mioVotoPerQuestoGioco = currentVotes.find(v => v.userId === currentUser?.uid && v.game === g.name);
        
        // 2. Controllo permessi (Validato o Admin)
        const canVote = currentUser && (userDoc?.validato || currentUser.email === "salvatoredidato01@gmail.com");

        // Calcoliamo se il gioco deve essere evidenziato perché votato dall'utente cliccato nella sidebar
        const isHighlighted = selectedUserHighlight && currentVotes.some(v => v.userId === selectedUserHighlight && v.game === g.name);

        return `
            <div class="game-card ${isHighlighted ? 'highlight' : ''}">
                <img src="${g.thumb}">
                <div class="game-card-content">
                    <h4>${g.name}</h4>
                    <p style="font-size:0.75em; color:#777;">${g.type} | ${g.time} min</p>
                    
                    ${mioVotoPerQuestoGioco ? 
                        // SE HO GIÀ VOTATO: Mostra il tasto rosso per cancellare
                        `<button class="btn-danger" onclick="annullaVoto('${mioVotoPerQuestoGioco.id}')">
                            ❌ ANNULLA MIO VOTO
                        </button>` :
                        // SE NON HO VOTATO: Mostra il tasto verde (se ho i permessi)
                        `<button class="btn-vota" ${!canVote ? 'disabled' : ''} onclick="vota('${g.name.replace(/'/g, "\\'")}')">
                            ${!currentUser ? 'ACCEDI PER VOTARE' : (canVote ? 'VOTA' : 'IN ATTESA DI OK')}
                        </button>`
                    }
                </div>
            </div>`;
    }).join('');
}
    }

    function updateRanking() {
        const counts = {};
        currentVotes.forEach(v => counts[v.game] = (counts[v.game] || 0) + 1);
        const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
        
        document.getElementById('classifica-voti').innerHTML = sorted.map(([g, v]) => `
            <div class="rank-item">
                <span>${g}</span> <b style="color:var(--orange)">${v}</b>
            </div>`).join('') || "Nessun voto.";
    }

    function updateParticipants() {
        const users = {};
        currentVotes.forEach(v => {
            users[v.userId] = v.username;
        });

        const container = document.getElementById('user-list');
        container.innerHTML = Object.entries(users).map(([id, name]) => `
            <span class="user-tag ${selectedUserHighlight === id ? 'active' : ''}" onclick="toggleHighlight('${id}')">
                ${name}
            </span>
        `).join('') || "Nessun partecipante.";
    }

    // --- Funzioni Globali ---

    window.toggleHighlight = (userId) => {
        selectedUserHighlight = (selectedUserHighlight === userId) ? null : userId;
        renderUI();
        updateParticipants();
    };

    window.vota = async (gameName) => {
        if (!currentUser) return;
        try {
            await addDoc(collection(db, "polls", activePoll.id, "votes"), {
                userId: currentUser.uid,
                username: userDoc?.username || "Admin",
                game: gameName,
                timestamp: serverTimestamp()
            });
        } catch (e) { alert("Errore nel voto: " + e.message); }
    };

window.annullaVoto = async (votoId) => {
    if (!activePoll) return;
    
    // Chiediamo conferma per evitare click accidentali
    if(confirm("Vuoi davvero rimuovere questo voto?")) {
        try {
            // Puntiamo al documento specifico dentro la sottocollezione 'votes'
            await deleteDoc(doc(db, "polls", activePoll.id, "votes", votoId));
            // Non serve ricaricare la pagina, onSnapshot aggiornerà la griglia da solo!
        } catch (e) {
            console.error("Errore cancellazione:", e);
            alert("Errore: non hai i permessi per cancellare questo voto.");
        }
    }
};

    // Eventi per i filtri
    document.getElementById('f-type').addEventListener('change', renderUI);
    document.getElementById('f-time').addEventListener('input', renderUI);

</script>
</body>
</html>
